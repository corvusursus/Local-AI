<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Чат с ИИ</title>
</head>
<body>
    <main class="chat-card">
        <h1>Чат с ИИ</h1>
        <div class="chat-log" id="chatLog"></div>

        <form id="chatForm" class="chat-form">
            <input type="text" id="questionInput" placeholder="Вопрос..." autocomplete="off" required>
            <button id="sendButton" type="submit">Отправить</button>
        </form>
    </main>

    <script>
        const chatForm = document.getElementById("chatForm");
        const questionInput = document.getElementById("questionInput")
        const sendButton = document.getElementById("sendButton")
        const chatLog = document.getElementById("chatLog")

        function addMessage(sender, text) {
            const messageElement = document.createElement("div")
            messageElement.className = `message ${sender}`
            messageElement.textContent = text
            chatLog.appendChild(messageElement)
            chatLog.scrollTop = chatLog.scrollHeight
        }

        function addLoader() {
            const loaderElement = document.createElement("div")
            loaderElement.className = "message assistant loading"
            loaderElement.innerHTML = "<span class='spinner'></span>Думаю..."
            chatLog.appendChild(loaderElement)
            chatLog.scrollTop = chatLog.scrollHeight
            return loaderElement
        }

        function setWaiting(waiting) {
            questionInput.disabled = waiting
            sendButton.disabled = waiting
            sendButton.textContent = waiting ? "Жду" : "Ответить"
        }

        addMessage("assistant", "Задайте вопрос.")

        chatForm.addEventListener("submit", async function(event) {
            event.preventDefault();
            const questionText = questionInput.value.trim()
            if (questionText === "") {
                return
            }

             addMessage("user", questionText)
             questionInput.value = ""
             setWaiting(true)
             const loaderElement = addLoader()

             try {
                const response = await fetch("/ask", {
                    method:"POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({ question: questionText })
                })

                const responseData = await response.json()
                loaderElement.remove()

                if (response.ok) {
                    addMessage("assistant", responseData.answer)
                } else {
                    addMessage("assistant", responseData.error)
                }
             } catch (error) {
                loaderElement.remove()
                addMessage("assistant", "Ошибка соединения")
             } finally {
                setWaiting(false)
                questionInput.focus()
             }
        })
    </script>
</body>
</html>
